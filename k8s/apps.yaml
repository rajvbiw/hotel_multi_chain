apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: omnibite
spec:
  replicas: 1
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: hotel_multi_chain-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: AUTH_SERVICE_URL
              value: http://auth-service:5001
            - name: MENU_SERVICE_URL
              value: http://menu-service:5002
            - name: ORDER_SERVICE_URL
              value: http://order-service:5003
            - name: INVENTORY_SERVICE_URL
              value: http://inventory-service:5004
            - name: LOYALTY_SERVICE_URL
              value: http://loyalty-service:5005
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:5006
            - name: REDIS_URL
              value: redis://redis:6379
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            successThreshold: 1
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: omnibite
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 5000
  selector:
    app: gateway
---
apiVersion: apps/v1
kind: Deployment
