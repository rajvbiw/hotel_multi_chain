apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 10s
        http:
          valid_http_versions: [HTTP/1.1, HTTP/2]
          valid_status_codes: [200]
          method: GET
          preferred_ip_protocol: "ip4"
