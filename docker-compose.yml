version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: omnibite-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: omnibite-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: omnibite-auth-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_auth
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-restaurant-platform
      - JWT_EXPIRES_IN=24h
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  menu-service:
    build:
      context: .
      dockerfile: services/menu-service/Dockerfile
    container_name: omnibite-menu-service
    restart: unless-stopped
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_menu
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: omnibite-order-service
    restart: unless-stopped
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_orders
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  inventory-service:
    build:
      context: .
      dockerfile: services/inventory-service/Dockerfile
    container_name: omnibite-inventory-service
    restart: unless-stopped
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_inventory
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  loyalty-service:
    build:
      context: .
      dockerfile: services/loyalty-service/Dockerfile
    container_name: omnibite-loyalty-service
    restart: unless-stopped
    ports:
      - "5005:5005"
    environment:
      - PORT=5005
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_loyalty
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: omnibite-notification-service
    restart: unless-stopped
    ports:
      - "5006:5006"
    environment:
      - PORT=5006
      - MONGODB_URI=mongodb://mongodb:27017/restaurant_platform_notifications
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: omnibite-gateway
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth-service:5001
      - MENU_SERVICE_URL=http://menu-service:5002
      - ORDER_SERVICE_URL=http://order-service:5003
      - INVENTORY_SERVICE_URL=http://inventory-service:5004
      - LOYALTY_SERVICE_URL=http://loyalty-service:5005
      - NOTIFICATION_SERVICE_URL=http://notification-service:5006
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super-secret-key-restaurant-platform
    depends_on:
      auth-service:
        condition: service_started
      menu-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      loyalty-service:
        condition: service_started
      notification-service:
        condition: service_started
      redis:
        condition: service_healthy

  seeder:
    build:
      context: .
      dockerfile: services/menu-service/Dockerfile
    container_name: omnibite-seeder
    command: node services/menu-service/dist/seed.js
    environment:
      - MONGO_AUTH_URI=mongodb://mongodb:27017/restaurant_platform_auth
      - MONGO_MENU_URI=mongodb://mongodb:27017/restaurant_platform_menu
      - MONGO_INVENTORY_URI=mongodb://mongodb:27017/restaurant_platform_inventory
      - MONGO_LOYALTY_URI=mongodb://mongodb:27017/restaurant_platform_loyalty
      - MONGO_NOTIFICATION_URI=mongodb://mongodb:27017/restaurant_platform_notifications
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
    container_name: omnibite-frontend
    restart: unless-stopped
    ports:
      - "8081:8081"
    depends_on:
      - gateway

  prometheus:
    image: prom/prometheus:latest
    container_name: omnibite-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - gateway
      - auth-service
      - menu-service
      - order-service
      - inventory-service
      - loyalty-service
      - notification-service

  grafana:
    image: grafana/grafana:latest
    container_name: omnibite-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data:
