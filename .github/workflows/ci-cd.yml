name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build workspace packages
        run: npm run build

      - name: Validate frontend build
        working-directory: frontend
        run: npm run build

  deploy:
    name: Deploy to AWS
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Cache Terraform plugins and state
        uses: actions/cache@v4
        with:
          path: |
            ~/.terraform.d/plugin-cache
            infrastructure/terraform/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('infrastructure/terraform/**/*.tf') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Initialize Terraform
        run: terraform -chdir=infrastructure/terraform init

      - name: Validate Terraform
        run: terraform -chdir=infrastructure/terraform validate

      - name: Plan Terraform
        run: terraform -chdir=infrastructure/terraform plan -out=tfplan

      - name: Apply Terraform
        run: terraform -chdir=infrastructure/terraform apply -auto-approve tfplan

      - name: Read ECR repository URLs
        id: ecr
        run: |
          echo "cluster_name=$(terraform -chdir=infrastructure/terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "gateway=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_gateway)" >> $GITHUB_OUTPUT
          echo "auth_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_auth_service)" >> $GITHUB_OUTPUT
          echo "menu_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_menu_service)" >> $GITHUB_OUTPUT
          echo "order_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_order_service)" >> $GITHUB_OUTPUT
          echo "inventory_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_inventory_service)" >> $GITHUB_OUTPUT
          echo "loyalty_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_loyalty_service)" >> $GITHUB_OUTPUT
          echo "notification_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_notification_service)" >> $GITHUB_OUTPUT
          echo "frontend=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_frontend)" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker images with cache
        run: |
          set -e
          declare -A repos=(
            [gateway]="${{ steps.ecr.outputs.gateway }}"
            [auth-service]="${{ steps.ecr.outputs.auth_service }}"
            [menu-service]="${{ steps.ecr.outputs.menu_service }}"
            [order-service]="${{ steps.ecr.outputs.order_service }}"
            [inventory-service]="${{ steps.ecr.outputs.inventory_service }}"
            [loyalty-service]="${{ steps.ecr.outputs.loyalty_service }}"
            [notification-service]="${{ steps.ecr.outputs.notification_service }}"
            [frontend]="${{ steps.ecr.outputs.frontend }}"
          )

          for service in "${!repos[@]}"; do
            repo=${repos[$service]}
            build_path="services/${service}"
            if [ "$service" = "frontend" ]; then
              build_path="frontend"
            fi
            echo "Building $service -> $repo:latest"
            docker buildx build \
              --push \
              --tag "$repo:latest" \
              --cache-from=type=registry,ref="$repo:buildcache" \
              --cache-to=type=registry,mode=max,ref="$repo:buildcache" \
              -f "$build_path/Dockerfile" "$build_path"
          done

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name "${{ steps.ecr.outputs.cluster_name }}"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy Kubernetes resources
        run: |
          cp -r infrastructure/k8s /tmp/k8s-rendered
          sed -i "s|{{GATEWAY_IMAGE}}|${{ steps.ecr.outputs.gateway }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{AUTH_SERVICE_IMAGE}}|${{ steps.ecr.outputs.auth_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{MENU_SERVICE_IMAGE}}|${{ steps.ecr.outputs.menu_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{ORDER_SERVICE_IMAGE}}|${{ steps.ecr.outputs.order_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{INVENTORY_SERVICE_IMAGE}}|${{ steps.ecr.outputs.inventory_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{LOYALTY_SERVICE_IMAGE}}|${{ steps.ecr.outputs.loyalty_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{NOTIFICATION_SERVICE_IMAGE}}|${{ steps.ecr.outputs.notification_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{FRONTEND_IMAGE}}|${{ steps.ecr.outputs.frontend }}:latest|g" /tmp/k8s-rendered/*.yaml
          kubectl apply -f /tmp/k8s-rendered
