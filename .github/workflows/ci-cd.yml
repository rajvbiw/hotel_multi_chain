name: 🚀 Hotel Microservices CI/CD + DevSecOps Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

concurrency:
  group: hotel-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "omnibus-eks-cluster"
  K8S_NAMESPACE: "hotel-management"

jobs:
  # =========================================================
  # Backend Quality Checks
  # =========================================================
  backend-quality:
    name: 🔧 Backend Quality & Security
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - menu-service
          - order-service
          - inventory-service
          - loyalty-service
          - notification-service

    defaults:
      run:
        working-directory: services/${{ matrix.service }}

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔍 ESLint
        run: npm run lint --if-present

      - name: 🔍 TypeScript Check
        run: npm run typecheck --if-present

      - name: 🧪 Run Tests
        run: npm test --if-present

      - name: 🔒 npm Audit
        run: npm audit --audit-level=high || true

  # =========================================================
  # Frontend Quality Checks
  # =========================================================
  frontend-quality:
    name: 🎨 Frontend Build & Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🔍 ESLint
        run: npm run lint --if-present

      - name: 🔍 TypeScript Validation
        run: npm run typecheck --if-present

      - name: 🏗️ Frontend Build
        run: npm run build

      - name: 🔒 Frontend npm Audit
        run: npm audit --audit-level=high || true

      - name: 📤 Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # =========================================================
  # Secret Scanning
  # =========================================================
  secret-scan:
    name: 🔐 Secret & Credential Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: --all

  # =========================================================
  # Terraform Validation + Security
  # =========================================================
  terraform-security:
    name: 🌿 Terraform Validation & Security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🌿 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: 🔧 Terraform Init
        run: terraform init -backend=false

      - name: 🔍 Terraform Format
        run: terraform fmt -recursive

      - name: 🔍 Terraform Validate
        run: terraform validate

      - name: 🔒 Trivy Terraform Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "infrastructure/terraform"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # # =========================================================
  # # Kubernetes Validation + Security
  # # =========================================================
  # kubernetes-security:
  #   name: ☸️ Kubernetes Validation & Security
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: 📥 Checkout Repository
  #       uses: actions/checkout@v4

  #     - name: 🔍 Validate Kubernetes YAML
  #       uses: instrumenta/kubeval-action@master
  #       with:
  #         files: infrastructure/k8s

  #     - name: 🔒 Kubernetes Security Scan
  #       uses: stackrox/kube-linter-action@v1
  #       with:
  #         directory: infrastructure/k8s

  # =========================================================
  # Docker Build + Trivy Scan
  # =========================================================
  docker-security:
    name: 🐳 Docker Build & Trivy Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - menu-service
          - order-service
          - inventory-service
          - loyalty-service
          - notification-service
          - frontend

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker Image
        run: |
          BUILD_PATH="services/${{ matrix.service }}"

          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_PATH="frontend"
          fi

          docker build \
            -t ${{ matrix.service }}:latest \
            -f $BUILD_PATH/Dockerfile \
            .

      - name: 🔒 Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.service }}:latest"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  # =========================================================
  # Deployment Job
  # =========================================================
  deploy:
    name: 🚀 Deploy to AWS EKS
    runs-on: ubuntu-latest

    needs:
      - backend-quality
      - frontend-quality
      - secret-scan
      - terraform-security
      #- kubernetes-security
      - docker-security

    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🌿 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: 🔧 Terraform Init
        run: terraform -chdir=infrastructure/terraform init

      - name: 🔍 Terraform Validate
        run: terraform -chdir=infrastructure/terraform validate

      - name: 🔁 Import existing AWS resources into Terraform state
        run: |
          cd infrastructure/terraform
          CLUSTER_NAME=$(grep -E '^cluster_name\s*=\s*".*"' terraform.tfvars terraform.tfvars.example 2>/dev/null | head -n1 | sed -E 's/.*=\s*"(.*)".*/\1/')
          if [ -z "$CLUSTER_NAME" ]; then
            CLUSTER_NAME=omnibus-eks-cluster
          fi

          VPC_ID=$(aws ec2 describe-vpcs --filters Name=tag:Name,Values=${CLUSTER_NAME}-vpc --query 'Vpcs[0].VpcId' --output text)
          if [ -n "$VPC_ID" ]; then
            terraform state list | grep -Fxq aws_vpc.main || terraform import aws_vpc.main "$VPC_ID" || true
          fi

          IGW_ID=$(aws ec2 describe-internet-gateways --filters Name=tag:Name,Values=${CLUSTER_NAME}-igw --query 'InternetGateways[0].InternetGatewayId' --output text)
          if [ -n "$IGW_ID" ]; then
            terraform state list | grep -Fxq aws_internet_gateway.main || terraform import aws_internet_gateway.main "$IGW_ID" || true
          fi

          for idx in 0 1 2; do
            SUBNET_ID=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID Name=cidr-block,Values=10.0.$((idx + 1)).0/24 --query 'Subnets[0].SubnetId' --output text)
            if [ -n "$SUBNET_ID" ]; then
              terraform state list | grep -Fxq "aws_subnet.public[\"$idx\"]" || terraform import "aws_subnet.public[\"$idx\"]" "$SUBNET_ID" || true
            fi
          done

          RTB_ID=$(aws ec2 describe-route-tables --filters Name=vpc-id,Values=$VPC_ID Name=tag:Name,Values=${CLUSTER_NAME}-public-rt --query 'RouteTables[0].RouteTableId' --output text)
          if [ -n "$RTB_ID" ]; then
            terraform state list | grep -Fxq aws_route_table.public || terraform import aws_route_table.public "$RTB_ID" || true
          fi

          for idx in 0 1; do
            SUBNET_ID=$(aws ec2 describe-subnets --filters Name=vpc-id,Values=$VPC_ID Name=cidr-block,Values=10.0.$((idx + 1)).0/24 --query 'Subnets[0].SubnetId' --output text)
            if [ -n "$SUBNET_ID" ]; then
              ASSOC_ID=$(aws ec2 describe-route-tables --filters Name=association.subnet-id,Values=$SUBNET_ID --query 'RouteTables[0].Associations[0].RouteTableAssociationId' --output text)
              if [ -n "$ASSOC_ID" ]; then
                terraform state list | grep -Fxq "aws_route_table_association.public[\"$idx\"]" || terraform import "aws_route_table_association.public[\"$idx\"]" "$ASSOC_ID" || true
              fi
            fi
          done

          SG_ID=$(aws ec2 describe-security-groups --filters Name=vpc-id,Values=$VPC_ID Name=group-name,Values=${CLUSTER_NAME}-cluster-sg --query 'SecurityGroups[0].GroupId' --output text)
          if [ -n "$SG_ID" ]; then
            terraform state list | grep -Fxq aws_security_group.eks_cluster || terraform import aws_security_group.eks_cluster "$SG_ID" || true
          fi

          terraform state list | grep -Fxq aws_iam_role.eks_cluster_role || terraform import aws_iam_role.eks_cluster_role "$CLUSTER_NAME-cluster-role" || true
          terraform state list | grep -Fxq aws_iam_role.node_group_role || terraform import aws_iam_role.node_group_role "$CLUSTER_NAME-nodegroup-role" || true

          terraform state list | grep -Fxq aws_eks_cluster.main || terraform import aws_eks_cluster.main "$CLUSTER_NAME" || true
          terraform state list | grep -Fxq aws_eks_node_group.main || terraform import aws_eks_node_group.main "$CLUSTER_NAME:$CLUSTER_NAME-node-group" || true

          for repo in frontend gateway inventory-service menu-service loyalty-service notification-service auth-service order-service; do
            terraform state list | grep -Fxq "aws_ecr_repository.repos[\"$repo\"]" || terraform import "aws_ecr_repository.repos[\"$repo\"]" "$repo" || true
          done

      - name: 📋 Terraform Plan
        run: terraform -chdir=infrastructure/terraform plan -out=tfplan

      - name: 🚀 Terraform Apply
        run: terraform -chdir=infrastructure/terraform apply -auto-approve tfplan

      - name: 📤 Read Terraform Outputs
        id: terraform
        run: |
          echo "cluster_name=$(terraform -chdir=infrastructure/terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "gateway=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_gateway)" >> $GITHUB_OUTPUT
          echo "auth_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_auth_service)" >> $GITHUB_OUTPUT
          echo "menu_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_menu_service)" >> $GITHUB_OUTPUT
          echo "order_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_order_service)" >> $GITHUB_OUTPUT
          echo "inventory_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_inventory_service)" >> $GITHUB_OUTPUT
          echo "loyalty_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_loyalty_service)" >> $GITHUB_OUTPUT
          echo "notification_service=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_notification_service)" >> $GITHUB_OUTPUT
          echo "frontend=$(terraform -chdir=infrastructure/terraform output -raw ecr_repository_url_frontend)" >> $GITHUB_OUTPUT

      - name: 🔐 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚢 Build & Push Docker Images
        run: |
          set -e

          declare -A repos=(
            [gateway]="${{ steps.terraform.outputs.gateway }}"
            [auth-service]="${{ steps.terraform.outputs.auth_service }}"
            [menu-service]="${{ steps.terraform.outputs.menu_service }}"
            [order-service]="${{ steps.terraform.outputs.order_service }}"
            [inventory-service]="${{ steps.terraform.outputs.inventory_service }}"
            [loyalty-service]="${{ steps.terraform.outputs.loyalty_service }}"
            [notification-service]="${{ steps.terraform.outputs.notification_service }}"
            [frontend]="${{ steps.terraform.outputs.frontend }}"
          )

          for service in "${!repos[@]}"; do

            repo=${repos[$service]}
            build_path="services/${service}"

            if [ "$service" = "frontend" ]; then
              build_path="frontend"
            fi

            echo "🚢 Building $service"

            docker buildx build \
              --push \
              --tag "$repo:latest" \
              --cache-from=type=registry,ref="$repo:buildcache" \
              --cache-to=type=registry,mode=max,ref="$repo:buildcache" \
              -f "$build_path/Dockerfile" \
              .

          done

      - name: ☸️ Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: 🔗 Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name "${{ steps.terraform.outputs.cluster_name }}"

      - name: 📝 Render Kubernetes Manifests
        run: |
          cp -r infrastructure/k8s /tmp/k8s-rendered

          sed -i "s|{{GATEWAY_IMAGE}}|${{ steps.terraform.outputs.gateway }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{AUTH_SERVICE_IMAGE}}|${{ steps.terraform.outputs.auth_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{MENU_SERVICE_IMAGE}}|${{ steps.terraform.outputs.menu_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{ORDER_SERVICE_IMAGE}}|${{ steps.terraform.outputs.order_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{INVENTORY_SERVICE_IMAGE}}|${{ steps.terraform.outputs.inventory_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{LOYALTY_SERVICE_IMAGE}}|${{ steps.terraform.outputs.loyalty_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{NOTIFICATION_SERVICE_IMAGE}}|${{ steps.terraform.outputs.notification_service }}:latest|g" /tmp/k8s-rendered/*.yaml
          sed -i "s|{{FRONTEND_IMAGE}}|${{ steps.terraform.outputs.frontend }}:latest|g" /tmp/k8s-rendered/*.yaml

      - name: 🚀 Deploy Kubernetes Resources
        run: |
          kubectl apply -f /tmp/k8s-rendered

      - name: 🔄 Verify Rollouts
        run: |
          kubectl rollout status deployment/gateway -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/auth-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/menu-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/order-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/inventory-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/loyalty-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/notification-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: 📊 Cluster Health Check
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A

      - name: ✅ Deployment Successful
        run: |
          echo "🎉 Enterprise CI/CD + DevSecOps Pipeline Completed Successfully!"
