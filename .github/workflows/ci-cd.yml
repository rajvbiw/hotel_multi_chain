name: 🚀 Hotel Microservices CI/CD + DevSecOps Pipeline

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:

concurrency:
  group: hotel-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  AWS_REGION: "us-east-1"
  CLUSTER_NAME: "omnibus-eks-cluster"
  K8S_NAMESPACE: "omnibite"

jobs:
  # =========================================================
  # Backend Quality Checks
  # =========================================================
  backend-quality:
    name: 🔧 Backend Quality & Security
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - menu-service
          - order-service
          - inventory-service
          - loyalty-service
          - notification-service

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install Workspace Dependencies
        run: npm install

      - name: 🏗️ Build Shared Library
        run: npm run build -w shared

      - name: 🔍 ESLint
        run: npm run lint -w services/${{ matrix.service }} --if-present

      - name: 🔍 TypeScript Check
        run: npm run typecheck -w services/${{ matrix.service }} --if-present

      - name: 🧪 Run Tests
        run: npm test -w services/${{ matrix.service }} --if-present

      - name: 🔒 npm Audit
        run: npm audit --audit-level=high || true

  # =========================================================
  # Frontend Quality Checks
  # =========================================================
  frontend-quality:
    name: 🎨 Frontend Build & Security
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install Workspace Dependencies
        run: npm install

      - name: 🏗️ Build Shared Library
        run: npm run build -w shared

      - name: 🔍 ESLint
        run: npm run lint -w frontend --if-present

      - name: 🔍 TypeScript Validation
        run: npm run typecheck -w frontend --if-present

      - name: 🏗️ Frontend Build
        run: npm run build -w frontend

      - name: 🔒 Frontend npm Audit
        run: npm audit --audit-level=high || true

      - name: 📤 Upload Frontend Build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

  # =========================================================
  # Secret Scanning
  # =========================================================
  secret-scan:
    name: 🔐 Secret & Credential Scan
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔍 Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LOG_OPTS: --all

  # =========================================================
  # Kubernetes Validation + Security
  # # =========================================================
  # kubernetes-security:
  #   name: ☸️ Kubernetes Validation & Security
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: 📥 Checkout Repository
  #       uses: actions/checkout@v4

  #     - name: 🔍 Validate Kubernetes YAML
  #       uses: instrumenta/kubeval-action@master
  #       with:
  #         files: infrastructure/k8s

  #     - name: 🔒 Kubernetes Security Scan
  #       uses: stackrox/kube-linter-action@v1
  #       with:
  #         directory: infrastructure/k8s

  # =========================================================
  # Docker Build + Trivy Scan
  # =========================================================
  docker-security:
    name: 🐳 Docker Build & Trivy Scan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - auth-service
          - menu-service
          - order-service
          - inventory-service
          - loyalty-service
          - notification-service
          - frontend

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build Docker Image
        run: |
          BUILD_PATH="services/${{ matrix.service }}"

          if [ "${{ matrix.service }}" = "frontend" ]; then
            BUILD_PATH="frontend"
          fi

          docker build \
            -t ${{ matrix.service }}:latest \
            -f $BUILD_PATH/Dockerfile \
            .

      - name: 🔒 Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.service }}:latest"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  # =========================================================
  # Deployment Job
  # =========================================================
  deploy:
    name: 🚀 Deploy to AWS EKS
    runs-on: ubuntu-latest

    needs:
      - backend-quality
      - frontend-quality
      - secret-scan
      #- kubernetes-security
      - docker-security

    if: github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🧪 Get AWS Account ID
        id: aws_account
        run: |
          echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      - name: 🔐 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🚢 Build & Push Docker Images
        run: |
          set -e

          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}
          REPO_PREFIX="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          declare -A repos=(
            [gateway]="${REPO_PREFIX}/gateway"
            [auth-service]="${REPO_PREFIX}/auth-service"
            [menu-service]="${REPO_PREFIX}/menu-service"
            [order-service]="${REPO_PREFIX}/order-service"
            [inventory-service]="${REPO_PREFIX}/inventory-service"
            [loyalty-service]="${REPO_PREFIX}/loyalty-service"
            [notification-service]="${REPO_PREFIX}/notification-service"
            [frontend]="${REPO_PREFIX}/frontend"
            [seeder]="${REPO_PREFIX}/seeder"
          )

          for service in "${!repos[@]}"; do
            repo="${repos[$service]}"
            aws ecr describe-repositories --repository-names "$service" --region "${{ env.AWS_REGION }}" >/dev/null 2>&1 || \
              aws ecr create-repository --repository-name "$service" --region "${{ env.AWS_REGION }}" >/dev/null

            build_path="services/${service}"
            if [ "$service" = "frontend" ]; then
              build_path="frontend"
            elif [ "$service" = "seeder" ]; then
              build_path="services/menu-service"
            fi

            echo "🚢 Building and pushing $service to $repo:latest"

            docker buildx build \
              --push \
              --network host \
              --tag "$repo:latest" \
              --cache-from=type=registry,ref="$repo:buildcache" \
              --cache-to=type=registry,mode=max,ref="$repo:buildcache" \
              -f "$build_path/Dockerfile" \
              .
          done

      - name: ☸️ Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: 🔗 Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name "${{ env.CLUSTER_NAME }}"

      - name: 📝 Render Kubernetes Manifests
        run: |
          cp -r k8s /tmp/k8s-rendered

          REPO_PREFIX="${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          for image in auth-service menu-service order-service inventory-service loyalty-service notification-service gateway frontend seeder; do
            find /tmp/k8s-rendered -type f -name '*.yaml' -exec sed -i "s|hotel_multi_chain-${image}:latest|${REPO_PREFIX}/${image}:latest|g" {} +
          done

      - name: 🚀 Deploy Kubernetes Namespaces
        run: |
          kubectl apply -f /tmp/k8s-rendered/namespace.yaml

      - name: 🚀 Deploy Kubernetes Applications
        run: |
          kubectl apply -f /tmp/k8s-rendered/apps.yaml
          kubectl delete job seeder -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
          kubectl apply -f /tmp/k8s-rendered/seeder-job.yaml
          kubectl apply -R -f /tmp/k8s-rendered/monitoring

      - name: 🔄 Verify Rollouts
        id: verify_rollouts
        continue-on-error: true
        run: |
          kubectl rollout status deployment/gateway -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/auth-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/menu-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/order-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/inventory-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/loyalty-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/notification-service -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/frontend -n ${{ env.K8S_NAMESPACE }} --timeout=300s

      - name: 🔄 Rollback failed deployments
        if: steps.verify_rollouts.outcome == 'failure'
        run: |
          for deployment in gateway auth-service menu-service order-service inventory-service loyalty-service notification-service frontend; do
            kubectl rollout undo deployment/$deployment -n ${{ env.K8S_NAMESPACE }} || true
          done

      - name: ❗ Fail if rollout failed
        if: steps.verify_rollouts.outcome == 'failure'
        run: |
          echo "Deployment rollout failed and rollback was executed."
          exit 1

      - name: 📊 Cluster Health Check
        run: |
          kubectl get nodes
          kubectl get pods -A
          kubectl get svc -A

      - name: ✅ Deployment Successful
        run: |
          echo "🎉 Enterprise CI/CD + DevSecOps Pipeline Completed Successfully!"
