        fsGroup: 1001

      containers:
        - name: redis
          image: redis:7.2-alpine

          ports:
            - containerPort: 6379

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: redis-data
              mountPath: /data

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: redis-data
          emptyDir: {}

---
