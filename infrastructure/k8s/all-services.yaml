```yaml
apiVersion: v1
kind: Secret
metadata:
  name: hotel-secret
type: Opaque
stringData:
  jwt-secret: "supersecretkey"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  selector:
    matchLabels:
      app: mongo

  replicas: 1

  template:
    metadata:
      labels:
        app: mongo

    spec:
      securityContext:
        fsGroup: 1001

      containers:
        - name: mongo
          image: mongo:6.0.13

          ports:
            - containerPort: 27017

          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

          volumeMounts:
            - name: mongo-data
              mountPath: /data/db

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: mongo-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: mongo

spec:
  selector:
    app: mongo

  ports:
    - port: 27017
      targetPort: 27017

  type: ClusterIP

---
